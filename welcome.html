<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Guangzhou</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Custom CSS Base -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Essential overrides to ensure the welcome page is perfectly full-screen without scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Lock scrolling */
            background-color: #0f172a;
        }
        
        .welcome-hero {
            height: 100vh;
            width: 100vw;
            background-image: url('./images/1.jpg'); /* Use the impressive hero image */
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Ambient gradient shading mapping to the theme's color palette */
        .welcome-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.4) 0%, rgba(16, 185, 129, 0.4) 100%), rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .welcome-content {
            position: relative;
            z-index: 1;
            padding: 40px;
            animation: fadeInWelcome 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .welcome-title {
            font-family: var(--font-heading);
            font-size: 5.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.6);
            letter-spacing: 2px;
        }

        .welcome-subtitle {
            font-family: var(--font-body);
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 60px;
            font-weight: 300;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        .welcome-btn {
            display: inline-block;
            background: linear-gradient(90deg, var(--primary-blue), var(--primary-green));
            color: white;
            padding: 18px 60px;
            font-size: 1.25rem;
            font-weight: 600;
            font-family: var(--font-heading);
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        /* Shine effect on hover */
        .welcome-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: all 0.6s ease;
        }

        .welcome-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.6);
            border-color: rgba(255,255,255,0.5);
        }

        .welcome-btn:hover::after {
            left: 100%;
        }

        /* Beautiful entrance animation */
        @keyframes fadeInWelcome {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* Dynamic dots floating in background for premium feel */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.2) 2px, transparent 2px),
                radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 100px 100px, 50px 50px;
            background-position: 0 0, 25px 25px;
            animation: moveParticles 60s linear infinite;
        }

        @keyframes moveParticles {
            0% { background-position: 0 0, 25px 25px; }
            100% { background-position: 500px 500px, 525px 525px; }
        }

        @media (max-width: 768px) {
            .welcome-title { font-size: 3.5rem; }
            .welcome-subtitle { font-size: 1.2rem; }
            .welcome-btn { padding: 15px 40px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="welcome-hero">
        <div class="particles"></div>
        <div class="welcome-content">
            <h1 class="welcome-title">Guangzhou</h1>
            <p class="welcome-subtitle">The City of Flowers & Timeless Lingnan Culture</p>
            <!-- Button redirecting to Homepage -->
            <a href="index.html" class="welcome-btn">Explore the City</a>
        </div>
    </div>

</body>
</html>
